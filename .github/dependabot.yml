version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    # Look for GitHub Actions workflows in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns:
          - "*"

  # Enable version updates for Cargo (Rust)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait 14 days after a new release before proposing an update.
    # Mitigates supply-chain risk from freshly-published malicious versions.
    cooldown:
      default-days: 14
      include:
        - "*"
    groups:
      all-cargo:
        patterns:
          - "*"
